name: CI

# External actions are pinned to full commit SHAs to prevent supply-chain
# attacks via tag reassignment. Run `gh api repos/OWNER/REPO/git/refs/tags/vN`
# to look up the current SHA when upgrading.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pest (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - name: Checkout plugin
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, mbstring
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Run Pest
        run: ./vendor/bin/pest

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress

  code-style:
    name: php-cs-fixer (dry-run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        # Same ruleset as Spora core's .php-cs-fixer.php so plugin style matches host.
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction