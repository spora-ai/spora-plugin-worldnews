sonar.projectKey=spora-ai_spora-plugin-worldnews
sonar.organization=spora-ai

# Sources and tests
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/*Test.php,**/*.Test.php
sonar.exclusions=vendor/**,storage/**

# PHP test coverage (clover XML produced by `pest --coverage-clover=coverage.xml`)
sonar.php.coverage.reportPaths=coverage.xml

# 30-day leak period so the "Sonar way" gate's `new_*` metrics compute on
# projects with no previous-version baseline. Mirrors spora-core's setting.
sonar.leak.period=30
